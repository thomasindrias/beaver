name: Release macOS

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "GitHub release tag to create or update, for example v0.1.0. Leave blank to only upload an artifact."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build macOS DMG
    runs-on: macos-latest

    env:
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_PATH: ${{ github.workspace }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
      HAS_APP_STORE_CONNECT_API_KEY: ${{ secrets.APPLE_API_KEY != '' && secrets.APPLE_API_ISSUER != '' && secrets.APPLE_API_KEY_P8 != '' }}
      HAS_SIGNING_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 != '' }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      BEAVER_RELEASE_TAG: ${{ inputs.tag_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-darwin

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import Apple signing certificate
        if: env.HAS_SIGNING_CERTIFICATE == 'true'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/beaver-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/beaver-signing.keychain-db"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Write App Store Connect API key
        if: env.HAS_APP_STORE_CONNECT_API_KEY == 'true'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          mkdir -p private_keys
          printf '%s' "$APPLE_API_KEY_P8" > "$APPLE_API_KEY_PATH"

      - name: Build release DMG
        run: pnpm release:mac

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Beaver-macOS-DMG
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload updater artifacts
        if: env.TAURI_SIGNING_PRIVATE_KEY != ''
        uses: actions/upload-artifact@v4
        with:
          name: Beaver-macOS-Updater
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/updater/*
          if-no-files-found: error

      - name: Create or update GitHub release
        if: inputs.tag_name != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' -print -quit)"
          UPDATER_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle/updater"
          ASSETS=("$DMG")
          if [[ -f "$UPDATER_DIR/latest.json" ]]; then
            ASSETS+=("$UPDATER_DIR"/*.app.tar.gz "$UPDATER_DIR/latest.json")
          fi
          if gh release view "${{ inputs.tag_name }}" >/dev/null 2>&1; then
            gh release upload "${{ inputs.tag_name }}" "${ASSETS[@]}" --clobber
          else
            gh release create "${{ inputs.tag_name }}" "${ASSETS[@]}" --draft --title "${{ inputs.tag_name }}" --notes "Draft Beaver macOS release."
          fi
